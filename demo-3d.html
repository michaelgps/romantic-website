<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>three.js 星空 · 演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&family=EB+Garamond:ital@1&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#04040c; }
  #bg { position:fixed; inset:0;
    background: radial-gradient(ellipse at 50% 38%, #1a1838 0%, #0a0a1c 45%, #04040c 80%);
  }
  /* 你的背景图层（带暗罩，保证文字清晰）+ 轻微视差 */
  #bgimg { position:fixed; inset:-5%; z-index:1;
    background: #0a0a1c center center / cover no-repeat;
    background-image:
      linear-gradient(to bottom, rgba(4,4,12,.45) 0%, rgba(4,4,12,.12) 38%, rgba(4,4,12,.55) 100%),
      radial-gradient(ellipse at 50% 45%, rgba(4,4,12,0) 40%, rgba(4,4,12,.5) 100%),
      url('photos/bg.png');
    will-change: transform; transition: transform .25s ease-out;
  }
  canvas { position:fixed; inset:0; display:block; z-index:2; }
  .overlay { position:fixed; inset:0; z-index:5; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; pointer-events:none;
    font-family:"Noto Serif SC",serif; color:#eef1ff; padding:24px; }
  .sub { color:#aab0d8; letter-spacing:4px; font-weight:300; font-size:clamp(13px,3.8vw,18px);
    opacity:0; animation:fade 2.4s ease .4s forwards; }
  .name { font-family:"Ma Shan Zheng",serif; font-size:clamp(40px,12vw,82px); margin:18px 0 36px;
    color:#fff; text-shadow:0 0 40px rgba(255,226,168,.6), 0 0 12px rgba(180,200,255,.5);
    opacity:0; animation:fade 2.6s ease 1s forwards; }
  .name b { color:#ffe2a8; font-weight:400; }
  .enter { pointer-events:auto; background:transparent; border:1px solid rgba(184,180,230,.55);
    color:#eef1ff; padding:13px 34px; border-radius:999px; font-family:inherit; font-size:15px;
    letter-spacing:3px; cursor:pointer; transition:all .4s ease; opacity:0;
    animation:fade 2s ease 1.8s forwards, pulse 2.8s ease-in-out 2s infinite; }
  .enter:hover { background:rgba(184,180,230,.15); transform:translateY(-2px); }
  .tag { position:fixed; top:14px; left:0; right:0; text-align:center; z-index:6;
    color:#5a5f80; font-size:12px; letter-spacing:2px; font-family:"Noto Serif SC",serif; }
  .quote { position:fixed; bottom:26px; left:0; right:0; text-align:center; z-index:6;
    font-family:"EB Garamond",serif; font-style:italic; color:#8a90b8; font-size:clamp(13px,3.4vw,16px);
    opacity:0; animation:fade 3s ease 2.6s forwards; }
  @keyframes fade { to { opacity:1; } }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(184,180,230,0);} 50%{ box-shadow:0 0 26px 2px rgba(184,180,230,.3);} }
</style>
</head>
<body>
<div id="bg"></div>
<div id="bgimg"></div>
<div class="tag">three.js 演示 · 你的背景图 + 星空（手指/鼠标拖动试试）</div>
<div class="overlay">
  <div class="sub">在阿克拉西亚的星空下，我遇见了你</div>
  <div class="name">致 <b id="name">宝贝</b></div>
  <button class="enter">轻触进入星空 ✦</button>
</div>
<div class="quote">May fate take you to another beautiful journey.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
camera.position.z = 380;
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* ---- 生成柔光圆点贴图 ---- */
function discTexture(){
  const c = document.createElement('canvas'); c.width=c.height=64;
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,'rgba(255,255,255,1)');
  grd.addColorStop(.3,'rgba(255,255,255,.85)');
  grd.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=grd; g.beginPath(); g.arc(32,32,32,0,Math.PI*2); g.fill();
  return new THREE.CanvasTexture(c);
}
const sprite = discTexture();

/* ---- 星河（自定义 shader：呼吸闪烁 + 金/蓝双色） ---- */
const COUNT = 6000;
const pos = new Float32Array(COUNT*3);
const col = new Float32Array(COUNT*3);
const phase = new Float32Array(COUNT);
const sz = new Float32Array(COUNT);
const cGold = new THREE.Color(0xffe2a8), cBlue = new THREE.Color(0xaecbff), cWhite = new THREE.Color(0xffffff);
for(let i=0;i<COUNT;i++){
  // 在一个扁球壳里分布，像银河盘
  const r = 120 + Math.pow(Math.random(),.6)*640;
  const th = Math.random()*Math.PI*2;
  const y = (Math.random()-0.5)*r*0.35;
  pos[i*3]   = Math.cos(th)*r;
  pos[i*3+1] = y;
  pos[i*3+2] = Math.sin(th)*r;
  const t = Math.random();
  const c = t<0.18 ? cGold : (t<0.4 ? cBlue : cWhite);
  col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  phase[i] = Math.random()*Math.PI*2;
  sz[i] = Math.random()*Math.random()*3.2 + 0.6;
}
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
geo.setAttribute('aColor', new THREE.BufferAttribute(col,3));
geo.setAttribute('aPhase', new THREE.BufferAttribute(phase,1));
geo.setAttribute('aSize', new THREE.BufferAttribute(sz,1));

const mat = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0}, uTex:{value:sprite}, uSize:{value: innerHeight/12 } },
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:`
    attribute vec3 aColor; attribute float aPhase; attribute float aSize;
    uniform float uTime; uniform float uSize;
    varying vec3 vColor; varying float vTw;
    void main(){
      vColor=aColor;
      vTw = 0.45 + 0.55*sin(uTime*1.6 + aPhase);
      vec4 mv = modelViewMatrix * vec4(position,1.0);
      gl_PointSize = aSize * uSize / -mv.z;
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader:`
    uniform sampler2D uTex; varying vec3 vColor; varying float vTw;
    void main(){
      float a = texture2D(uTex, gl_PointCoord).a;
      gl_FragColor = vec4(vColor, a*vTw);
    }`
});
const galaxy = new THREE.Points(geo, mat);
scene.add(galaxy);

/* ---- 中心星云辉光 ---- */
function nebula(color,size,x,y,z,op){
  const c=document.createElement('canvas'); c.width=c.height=256; const g=c.getContext('2d');
  const grd=g.createRadialGradient(128,128,0,128,128,128);
  grd.addColorStop(0,color); grd.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grd; g.fillRect(0,0,256,256);
  const m=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),blending:THREE.AdditiveBlending,transparent:true,opacity:op,depthWrite:false});
  const s=new THREE.Sprite(m); s.scale.set(size,size,1); s.position.set(x,y,z); scene.add(s); return s;
}
// 背景图已自带星云，这里只留很淡的辉光做层次
nebula('rgba(120,90,200,.3)',900,-120,40,-120,.4);
nebula('rgba(90,140,220,.25)',800,80,-20,40,.3);

/* ---- 视差（鼠标 / 陀螺仪） ---- */
const bgimg = document.getElementById('bgimg');
let tx=0, ty=0, cx=0, cy=0;
addEventListener('mousemove', e=>{ tx=(e.clientX/innerWidth-0.5); ty=(e.clientY/innerHeight-0.5); });
addEventListener('touchmove', e=>{ const t=e.touches[0]; tx=(t.clientX/innerWidth-0.5); ty=(t.clientY/innerHeight-0.5); }, {passive:true});
addEventListener('deviceorientation', e=>{ if(e.gamma!=null){ tx=Math.max(-.5,Math.min(.5,e.gamma/45)); ty=Math.max(-.5,Math.min(.5,(e.beta-45)/45)); } });

/* ---- 流星 ---- */
let shoot=null;
function maybeShoot(){
  if(shoot||Math.random()>0.012) return;
  const g=new THREE.BufferGeometry();
  const start=new THREE.Vector3((Math.random()-0.5)*700, 150+Math.random()*150, -50);
  const end=start.clone().add(new THREE.Vector3(-180-Math.random()*120,-180-Math.random()*120,0));
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([...start.toArray(),...end.toArray()]),3));
  const m=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending});
  const line=new THREE.Line(g,m); scene.add(line); shoot={line,life:0};
}

/* ---- 循环 ---- */
const clock = new THREE.Clock();
function loop(){
  const t = clock.getElapsedTime();
  mat.uniforms.uTime.value = t;
  galaxy.rotation.y = t*0.04;
  galaxy.rotation.x = Math.sin(t*0.05)*0.08;
  cx += (tx - cx)*0.04; cy += (ty - cy)*0.04;
  camera.position.x = cx*120;
  camera.position.y = -cy*80;
  camera.lookAt(0,0,0);
  // 背景图反向轻微视差（比星星慢，做出纵深）
  if(bgimg) bgimg.style.transform = `translate(${-cx*26}px, ${-cy*18}px) scale(1.1)`;
  maybeShoot();
  if(shoot){ shoot.life+=0.02; shoot.line.material.opacity = Math.sin(shoot.life*Math.PI); if(shoot.life>=1){ scene.remove(shoot.line); shoot=null; } }
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
loop();

addEventListener('resize', ()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); mat.uniforms.uSize.value=innerHeight/12;
});

document.querySelector('.enter').addEventListener('click',()=>{
  // 演示：点击后镜头缓缓推进星河（穿越感）
  let z=camera.position.z, target=80, s=0;
  (function dive(){ s+=0.02; camera.position.z = z+(target-z)*Math.min(1,s); if(s<1) requestAnimationFrame(dive); })();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>致花花</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=EB+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" />
  <link rel="stylesheet" href="style.css?v=36" />
</head>
<body>
  <audio id="bgm" loop></audio>

  <div id="startOverlay" class="start-overlay">
    <video class="start-bg-video" autoplay loop muted playsinline preload="auto" poster="photos/bg.png">
      <source src="video/opening.mp4" type="video/mp4">
    </video>
    <div class="start-inner">
      <p class="start-sub" id="startSub"></p>
      <h1 class="start-title">致 <span id="startName">花花</span></h1>
      <button id="startBtn" class="start-btn" aria-label="点亮这段回忆">
        <span class="start-btn-icon">▶</span>
      </button>
      <div id="introLines" class="intro-lines" aria-live="polite">
        <p class="intro-line" id="introLine1"></p>
      </div>
    </div>
  </div>

  <main id="stage" class="stage"></main>

  <div id="progress" class="progress hidden"><div id="progressFill" class="progress-fill"></div></div>

  <button id="replayBtn" class="replay-btn hidden">↻ 重看</button>

  <script src="script.js?v=36"></script>
</body>
</html>
